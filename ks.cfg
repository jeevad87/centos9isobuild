# Basic setup
text
cdrom

lang en_US.UTF-8
keyboard us
timezone Asia/Kolkata --isUtc

network --bootproto=dhcp  --activate

rootpw --iscrypted $6$5QP8BnYKzQgoFNcI$Azy0jju1wA/jJgZxCo5BxTDXltTKSwhNkSByWrfGLhUPiWrb6xDFp7obB1vi68Rdpcazr6t12kCL1nNMU9q020

firewall --enabled
selinux --permissive
reboot --eject


# ======= Storage Partition ======

bootloader --append="rhgb quiet crashkernel=auto ipv6.disable=1"

%pre
DISK_TOTAL=51200

if [ -d /sys/firmware/efi ]; then
    # UEFI MODE
    EFI_SIZE=600
    PV_SIZE=$((DISK_TOTAL - EFI_SIZE))

    cat > /tmp/part-include <<EOF
clearpart --all --initlabel --disklabel=gpt
zerombr

part /boot/efi --fstype=efi --size=${EFI_SIZE}
part pv.01 --size=${PV_SIZE}
EOF

else
    # BIOS MODE
    BOOT_SIZE=1024
    PV_SIZE=$((DISK_TOTAL - BOOT_SIZE))

    cat > /tmp/part-include <<EOF
clearpart --all --initlabel --disklabel=gpt
zerombr

part biosboot --fstype=biosboot --size=2
part /boot --fstype=xfs --size=${BOOT_SIZE}
part pv.01 --size=${PV_SIZE}
EOF
fi
%end

%include /tmp/part-include

volgroup VolGroup00 pv.01

logvol /     --vgname=VolGroup00 --name=LogVol00 --fstype=xfs --size=10240
logvol /var  --vgname=VolGroup00 --name=LogVol01 --fstype=xfs --size=2048
logvol /var/log  --vgname=VolGroup00 --name=LogVol02 --fstype=xfs --size=2048
logvol /var/log/audit  --vgname=VolGroup00 --name=LogVol03 --fstype=xfs --size=2048
logvol /tmp  --vgname=VolGroup00 --name=LogVol04 --fstype=xfs --size=5120
logvol /home --vgname=VolGroup00 --name=LogVol05 --fstype=xfs --size=5120
logvol swap  --vgname=VolGroup00 --name=LogVol06  --size=4096

# raw partition for remaining space
part none --size=1 --grow


%packages --excludedocs --ignoremissing

