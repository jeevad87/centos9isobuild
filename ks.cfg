sed -i 's/md5/sha512/g' /etc/pam.d/system-auth-ac 2>/dev/null
#
#
chmod 600 /boot/grub2/grub.cfg

##########################
# Sudo log configuration #
##########################


#  Setup Sudo Logging and I/O Directory
mkdir -p /var/log/sudo-io
chmod 700 /var/log/sudo-io

# Create the sudoers drop-in (No dots in filename)
cat << 'EOF' > /etc/sudoers.d/99_sudo_logging
Defaults logfile="/var/log/sudo.log"
Defaults log_input, log_output
Defaults iolog_dir="/var/log/sudo-io/%{user}"
EOF

chmod 0440 /etc/sudoers.d/99_sudo_logging

#  Configure Logrotate for the main sudo log (2-week retention)
cat << 'EOF' > /etc/logrotate.d/sudo
/var/log/sudo.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    create 0600 root root
}
EOF

#  Create a Cron Job to prune I/O session logs older than 14 days
# Logrotate doesn't handle the sudo-io directory tree well, so we use find.
cat << 'EOF' > /etc/cron.daily/sudo-io-prune
#!/bin/bash
/usr/bin/find /var/log/sudo-io -type f -mtime +14 -delete
/usr/bin/find /var/log/sudo-io -type d -empty -delete
EOF

chmod +x /etc/cron.daily/sudo-io-prune

#  Initialize log file
touch /var/log/sudo.log
chmod 600 /var/log/sudo.log


########################
# Enabing the gui mode #
########################
systemctl set-default graphical.target

rm -rf /root/original-ks.cfg /root/bin /root/anaconda-ks.cfg 2>/dev/null

inname=$(ip link show | grep 2 | cut -d' ' -f2 | cut -d: -f1 | head -n1)
ipaddress=$(ip addr show dev $inname | awk '/inet / {split($2, a, "/"); print a[1]}')
gateway=$(ip route show default | awk '{print $3}')
ifprefix=$(ip addr show dev $inname | awk '/inet / {split($2, a, "/"); print a[2]}')
EXEC_END_DATE=$(date)
chattr -i /root/build-info
echo "#############################################################" > /root/build-info
echo "#                         Build Info                        #" >> /root/build-info
echo "#############################################################" >> /root/build-info
echo "" >> /root/build-info
echo "Hostname             :  $(hostname -f)" >> /root/build-info
echo "Build Date           :  $(date)" >> /root/build-info
echo "IP Address           :  $ipaddress" >> /root/build-info
echo "Prefix               :  $ifprefix" >> /root/build-info
echo "Gateway              :  $gateway" >> /root/build-info
echo "OS Version           :  $(cat /etc/redhat-release)" >> /root/build-info
echo "Status               :  Completed Successfully" >> /root/build-info
echo "" >> /root/build-info
echo "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~" >> /root/build-info
echo "Note: execution logs availabe on /root/installation.log" >> /root/build-info
echo "~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~" >> /root/build-info
echo "" >> /root/build-info
echo "#############################################################" >> /root/build-info

chattr +i /root/build-info

%end

