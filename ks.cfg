#
### CIS@RHEL7-1.4.3
sed -i 's/\/usr\/sbin\/sulogin/\/sbin\/sulogin/g' /usr/lib/systemd/system/rescue.service
sed -i 's/\/usr\/sbin\/sulogin/\/sbin\/sulogin/g' /usr/lib/systemd/system/emergency.service
