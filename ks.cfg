touch /var/lock/subsys/local
#
### CIS@RHEL7-6.1.5
chmod 000 /etc/gshadow
### CIS@RHEL7-6.1.9
chmod 000 /etc/gshadow-
### CIS@RHEL7-5.1.2
chown root:root /etc/crontab
